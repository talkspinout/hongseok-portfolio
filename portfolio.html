<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자세한 포트폴리오 — 고홍석</title>
  <meta name="description" content="고홍석의 상세 포트폴리오는 열람 신청 후 Google Docs로 공유됩니다." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="portfolio">

  <header class="topbar">
    <button class="menu-btn" id="menuBtn" aria-expanded="false" aria-controls="gnb" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>
    <div class="gnb-logo"><span class="dot"></span>고홍석</div>
  </header>

  <nav class="gnb" id="gnb" aria-label="사이트 메뉴"></nav>

  <div class="main">
    <div class="wrap">

      <section>
        <span class="eyebrow">Detailed Portfolio</span>
        <h1 class="hero-title" id="gateHeadline"></h1>
        <p class="hero-sub">클라이언트 자료와 상세 성과 데이터가 포함되어 있어, 확인 절차를 거쳐 공유하고 있습니다. 신청 후 하루 안에 열람 권한을 보내 드립니다.</p>

        <!-- 블러 프리뷰 (실제 데이터가 아닌 목업입니다) -->
        <div class="gate-stage" aria-hidden="true">
          <div class="blur-stack">
            <div class="blur-card">
              <div class="num">CPL −64%</div>
              <div class="bar mid" style="margin-top:16px"></div>
              <div class="bar"></div>
              <div class="bar short"></div>
            </div>
            <div class="blur-card">
              <div class="num">ROAS 250%</div>
              <div class="bar short" style="margin-top:16px"></div>
              <div class="bar mid"></div>
              <div class="bar"></div>
            </div>
            <div class="blur-card">
              <div class="bar mid"></div>
              <div class="bar"></div>
              <div class="bar short"></div>
              <div class="bar mid"></div>
            </div>
            <div class="blur-card">
              <div class="num">Leads 800+</div>
              <div class="bar" style="margin-top:16px"></div>
              <div class="bar short"></div>
              <div class="bar mid"></div>
            </div>
          </div>
          <div class="gate-overlay">
            <div class="lock" aria-hidden="true">🔒</div>
            <h3>열람 신청 후
전체 내용을 확인하실 수 있습니다.</h3>
            <a class="btn btn-mint" href="#" data-form-link data-track="cta" data-track-id="request_portfolio" data-track-location="portfolio_gate">열람 신청하기 <span class="arrow">→</span></a>
          </div>
        </div>
      </section>

      <section>
        <h2 class="sec-title">열람 절차</h2>
        <div class="step-grid" id="stepGrid"></div>
        <div class="notice">채용 검토 목적의 신청은 모두 승인하고 있습니다. 급하신 경우 폼에 남겨 주시면 우선 처리하겠습니다.</div>
        <div style="margin-top:36px">
          <a class="btn btn-mint" href="#" data-form-link data-track="cta" data-track-id="request_portfolio" data-track-location="portfolio_steps">열람 신청하기 <span class="arrow">→</span></a>
        </div>
      </section>

      <footer>
        <div>© 2026 Hongseok Ko. All rights reserved.</div>
        <div class="social-row" data-social></div>
      </footer>

    </div>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/main.js"></script>
</body>
</html>
