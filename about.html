<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소개 — 고홍석</title>
  <meta name="description" content="GTM 전략부터 실행까지, 마케팅 전 과정을 연결해 성과 구조로 만드는 마케터 고홍석을 소개합니다." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="about">

  <header class="topbar">
    <button class="menu-btn" id="menuBtn" aria-expanded="false" aria-controls="gnb" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>
    <a class="gnb-logo" href="index.html" data-track="navigation" data-track-id="brand_home" data-track-location="topbar" aria-label="홈으로 이동"><span class="dot"></span>고홍석 · Marketing Portfolio</a>
  </header>

  <nav class="gnb" id="gnb" aria-label="사이트 메뉴"></nav>

  <div class="main">
    <div class="wrap">

      <!-- 자기 정의 -->
      <section>
        <span class="eyebrow">About</span>
        <h1 class="hero-title" id="aboutTitle"></h1>
        <p class="hero-sub" id="aboutSub"></p>
        <div class="direction-grid" id="careerDirections"></div>
      </section>

      <!-- 경력 여정 -->
      <section>
        <h2 class="sec-title">Career Journey</h2>
        <p class="sec-desc" id="journeyDesc"></p>
        <div class="journey-track" id="careerJourney"></div>
      </section>

      <!-- 전체 경력 -->
      <section>
        <h2 class="sec-title">Experience</h2>
        <p class="sec-desc" id="experienceDesc"></p>
        <div class="experience-list" id="experienceList"></div>
      </section>

      <!-- 핵심 역량 -->
      <section>
        <h2 class="sec-title">Core Capabilities</h2>
        <p class="sec-desc" id="capabilityDesc"></p>
        <div class="capability-grid" id="capabilityGrid"></div>
      </section>

      <!-- 다음 이동 -->
      <section>
        <div class="cta-band reveal" style="margin-top:0">
          <div>
            <h3>실제 문제 해결 과정이 궁금하시다면,
상세 포트폴리오를 확인하세요.</h3>
            <p>문제 정의부터 전략, 실행, 성과까지
프로젝트 단위로 자세히 정리했습니다.</p>
          </div>
          <div class="cta-actions">
            <a class="btn btn-mint" href="portfolio.html" data-track="cta" data-track-id="view_portfolio" data-track-location="about_bottom">상세 포트폴리오 보기 <span class="arrow">→</span></a>
            <a class="btn btn-line" href="lab.html" data-track="cta" data-track-id="view_framework" data-track-location="about_bottom">마케팅 프레임워크 보기 <span class="arrow">→</span></a>
          </div>
        </div>
      </section>

      <footer>
        <div>© 2026 Hongseok Ko. All rights reserved.</div>
        <div class="social-row" data-social></div>
      </footer>

    </div>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/main.js"></script>
</body>
</html>
